name: Feature request
description: A change to the pipeline's behaviour, a new skill, or a new flag.
title: "[feat] "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Lead with the problem. If you already have a fix in mind, sketch it at the end so the design discussion stays open.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What hurts today? Concrete situation, not abstract.
      placeholder: |
        When I run `/atdd-run` on a repo with 12 scenarios, the pipeline serializes the sub-PRs. Each one waits on CI for ~3 minutes. Total wall-clock is over half an hour even when half the PRs would be merge-clean on first try.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: |
        What would solve the problem? Be specific about which skill is affected and which knobs would change.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you considered
      description: What else could solve this? Why did you discard those?

  - type: dropdown
    id: scope
    attributes:
      label: Scope
      options:
        - New skill
        - Change to an existing skill's prompt
        - New flag on a slash command
        - New artifact on disk
        - Docs only
        - Other
    validations:
      required: true

  - type: dropdown
    id: importance
    attributes:
      label: Importance
      options:
        - Nice to have
        - Would unblock me
        - Critical for my workflow
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Anything else
      description: Links, prior art, screenshots, related issues you searched.
