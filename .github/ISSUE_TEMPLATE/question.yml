name: Question
description: A usage question. For design conversations, prefer Discussions.
title: "[q] "
labels: ["question"]
body:
  - type: markdown
    attributes:
      value: |
        Quick check first: the [README](../../README.md) and [USAGE](../../docs/USAGE.md) cover most of the common cases. If you've already looked there, great — file away.

  - type: textarea
    id: question
    attributes:
      label: Question
      description: What are you trying to do? What did you try?
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Context
      description: Plugin version, harness (Claude Code / Codex), and the bit of your setup that's relevant.
